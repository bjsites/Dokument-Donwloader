<!DOCTYPE html>
<html lang="bs">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instalacija prezentacije</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      padding: 30px;
      border-radius: 18px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin-bottom: 20px;
      font-size: 24px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    #message {
      margin-top: 18px;
      font-size: 16px;
      font-weight: bold;
    }

    .error {
      color: #f87171;
    }

    .success {
      color: #4ade80;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Pokreni instalaciju</h1>

    <input type="password" id="password" placeholder="Unesi šifru" />
    <button onclick="checkPassword()">Pošalji</button>

    <div id="message"></div>
  </div>

  <script>
    function checkPassword() {
      const password = document.getElementById('password').value;
      const message = document.getElementById('message');

      if (password === '43201') {
        message.textContent = 'Instalacija prezentacije počinje';
        message.className = 'success';

        // Automatsko preuzimanje PPT dokumenta
        const link = document.createElement('a');
        link.href = 'Checklist 4.pdf';
        link.download = 'Checklist 4.pdf';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      } else {
        message.textContent = 'Pogrešna šifra!';
        message.className = 'error';
      }
    }
  </script>
</body>

</html>
